<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neural TTS Demo</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, sans-serif; background: #18181b; color: #eee; padding: 32px; max-width: 680px; margin: 0 auto; }
h1 { font-size: 22px; color: #fff; margin-bottom: 6px; }
.subtitle { font-size: 13px; color: #888; margin-bottom: 24px; }

label { display: block; font-size: 13px; color: #aaa; margin-bottom: 5px; margin-top: 14px; }
select, textarea, input[type=range] {
    width: 100%; background: #2a2a2e; color: #eee;
    border: 1px solid #444; border-radius: 6px;
    padding: 9px 11px; font-size: 13px; font-family: inherit;
}
textarea { resize: vertical; min-height: 80px; }

.slider-row { display: flex; gap: 10px; align-items: center; margin-top: 14px; }
.slider-row label { margin: 0; white-space: nowrap; flex: 0 0 auto; }
.slider-row input[type=range] { padding: 0; flex: 1; }
.slider-val { min-width: 40px; text-align: right; font-size: 13px; color: #fff; font-variant-numeric: tabular-nums; }

.buttons { display: flex; gap: 10px; align-items: center; margin-top: 18px; flex-wrap: wrap; }
button {
    padding: 9px 22px; border: none; border-radius: 6px;
    font-size: 14px; font-weight: bold; cursor: pointer;
}
button:disabled { opacity: 0.4; cursor: default; }
#btn-speak { background: #2d9248; color: #fff; }
#btn-stop  { background: #d9534f; color: #fff; }
.queue-badge {
    background: #9146ff; color: #fff; border-radius: 12px;
    padding: 4px 12px; font-size: 12px; font-weight: bold; display: none;
}

#status-area { margin-top: 22px; }
.progress-track { background: #333; border-radius: 4px; height: 8px; overflow: hidden; margin-bottom: 6px; }
.progress-bar   { background: #9146ff; height: 100%; width: 0%; transition: width 0.15s; border-radius: 4px; }
.status-msg  { font-size: 13px; color: #aaa; }
.status-file { font-size: 11px; color: #666; margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.timer       { font-size: 12px; color: #9146ff; margin-top: 4px; min-height: 16px; font-variant-numeric: tabular-nums; }

#kokoro-controls, #supertonic-controls { display: contents; }

#slots { display: flex; flex-direction: column; gap: 10px; margin-top: 14px; }
.slot { display: flex; gap: 8px; align-items: flex-start; }
.slot textarea { flex: 1; min-height: 60px; margin: 0; }
.btn-slot-speak {
    flex: 0 0 auto; padding: 8px 14px; border: none; border-radius: 6px;
    background: #2d9248; color: #fff; font-size: 16px; font-weight: bold;
    cursor: pointer; align-self: stretch;
}
.btn-slot-speak:disabled { opacity: 0.4; cursor: default; }
#btn-speak-all { background: #2d9248; color: #fff; }
</style>
<script src="../js/tts-kokoro.js"></script>
</head>
<body>

<h1>Neural TTS Demo</h1>
<p class="subtitle">Kokoro (English) · Supertonic (31 languages) — 100% local, in-browser</p>

<label for="engine-select">Engine</label>
<select id="engine-select">
    <option value="kokoro">Kokoro — English only · 82M params · WASM/WebGPU</option>
    <option value="supertonic">Supertonic — 31 languages · 99M params · ~400 MB</option>
    <option value="web">Web Speech API (browser built-in)</option>
</select>

<!-- ── Web Speech API controls ───────────────── -->
<div id="web-controls" style="display:none">
    <label for="web-voice-select">Voice</label>
    <select id="web-voice-select"></select>
</div>

<!-- ── Kokoro controls ───────────────────────── -->
<div id="kokoro-controls">
    <label for="device-select">Device</label>
    <select id="device-select">
        <option value="webgpu">WebGPU — fp32 (~326 MB, Chrome 113+)</option>
        <option value="wasm">WASM — q8 (~86 MB, works everywhere)</option>
    </select>

    <label for="voice-select">Voice</label>
    <select id="voice-select">
        <option value="af_heart">Heart (US, Female)</option>
        <option value="af_bella">Bella (US, Female)</option>
        <option value="af_sarah">Sarah (US, Female)</option>
        <option value="af_sky">Sky (US, Female)</option>
        <option value="af_nicole">Nicole (US, Female)</option>
        <option value="am_adam">Adam (US, Male)</option>
        <option value="am_michael">Michael (US, Male)</option>
        <option value="bf_emma">Emma (GB, Female)</option>
        <option value="bf_isabella">Isabella (GB, Female)</option>
        <option value="bm_george">George (GB, Male)</option>
        <option value="bm_lewis">Lewis (GB, Male)</option>
    </select>
</div>

<!-- ── Supertonic controls ──────────────────── -->
<div id="supertonic-controls" style="display:none">
    <label for="supertonic-device-select">Device</label>
    <select id="supertonic-device-select">
        <option value="wasm">WASM (single-threaded, ~400 MB)</option>
        <option value="webgpu">WebGPU (GPU accelerated, ~400 MB)</option>
    </select>

    <label for="lang-select">Language</label>
    <select id="lang-select">
        <option value="en">English</option>
        <option value="de">German</option>
        <option value="fr">French</option>
        <option value="es">Spanish</option>
        <option value="it">Italian</option>
        <option value="pt">Portuguese</option>
        <option value="nl">Dutch</option>
        <option value="pl">Polish</option>
        <option value="ru">Russian</option>
        <option value="uk">Ukrainian</option>
        <option value="sv">Swedish</option>
        <option value="da">Danish</option>
        <option value="fi">Finnish</option>
        <option value="no">Norwegian</option>
        <option value="cs">Czech</option>
        <option value="sk">Slovak</option>
        <option value="ro">Romanian</option>
        <option value="hu">Hungarian</option>
        <option value="hr">Croatian</option>
        <option value="sl">Slovenian</option>
        <option value="bg">Bulgarian</option>
        <option value="el">Greek</option>
        <option value="tr">Turkish</option>
        <option value="ar">Arabic</option>
        <option value="hi">Hindi</option>
        <option value="id">Indonesian</option>
        <option value="vi">Vietnamese</option>
        <option value="ja">Japanese</option>
        <option value="ko">Korean</option>
        <option value="et">Estonian</option>
        <option value="lv">Latvian</option>
        <option value="lt">Lithuanian</option>
        <option value="na">Auto-detect</option>
    </select>

    <label for="style-select">Voice Style</label>
    <select id="style-select">
        <option value="M1">M1 (Male)</option>
        <option value="M2">M2 (Male)</option>
        <option value="M3">M3 (Male)</option>
        <option value="M4">M4 (Male)</option>
        <option value="M5">M5 (Male)</option>
        <option value="F1">F1 (Female)</option>
        <option value="F2">F2 (Female)</option>
        <option value="F3">F3 (Female)</option>
        <option value="F4">F4 (Female)</option>
        <option value="F5">F5 (Female)</option>
    </select>

    <div class="slider-row">
        <label for="steps-slider">Steps</label>
        <input type="range" id="steps-slider" min="1" max="12" step="1" value="8">
        <span class="slider-val" id="steps-val">8</span>
    </div>

    <div class="slider-row">
        <label for="speed-slider">Speed</label>
        <input type="range" id="speed-slider" min="0.5" max="2.0" step="0.05" value="1.05">
        <span class="slider-val" id="speed-val">1.05×</span>
    </div>
</div>

<div id="slots">
    <div class="slot">
        <textarea class="slot-text">Life is like a box of chocolates. You never know what you're gonna get.</textarea>
        <button class="btn-slot-speak">▶</button>
    </div>
    <div class="slot">
        <textarea class="slot-text">The knight moves in an L-shape, two squares in one direction and one square perpendicular.</textarea>
        <button class="btn-slot-speak">▶</button>
    </div>
    <div class="slot">
        <textarea class="slot-text">Checkmate! The king has no escape.</textarea>
        <button class="btn-slot-speak">▶</button>
    </div>
</div>

<div class="buttons">
    <button id="btn-speak-all">▶▶ Speak All</button>
    <button id="btn-stop" disabled>■ Stop</button>
</div>

<div id="status-area">
    <div class="progress-track"><div class="progress-bar" id="progress-bar"></div></div>
    <div class="status-msg"  id="status-msg">Ready — click Speak to load model and synthesise.</div>
    <div class="status-file" id="status-file"></div>
    <div class="timer"       id="timer"></div>
</div>

<script type="module">
// ── DOM refs ───────────────────────────────────────────────────
const btnSpeakAll  = document.getElementById('btn-speak-all');
const btnStop      = document.getElementById('btn-stop');
const statusMsg    = document.getElementById('status-msg');
const statusFile   = document.getElementById('status-file');
const progressBar  = document.getElementById('progress-bar');
const timerEl      = document.getElementById('timer');
const engineSelect = document.getElementById('engine-select');
const deviceSelect = document.getElementById('device-select');

if (!navigator.gpu) {
    for (const sel of [deviceSelect, document.getElementById('supertonic-device-select')]) {
        const opt = sel.querySelector('option[value="webgpu"]');
        opt.disabled = true;
        opt.textContent += ' — not available';
    }
}

document.getElementById('steps-slider').addEventListener('input', e =>
    document.getElementById('steps-val').textContent = e.target.value);
document.getElementById('speed-slider').addEventListener('input', e =>
    document.getElementById('speed-val').textContent = parseFloat(e.target.value).toFixed(2) + '×');

engineSelect.addEventListener('change', () => {
    const val = engineSelect.value;
    const isKokoro     = val === 'kokoro';
    const isSupertonic = val === 'supertonic';
    const isWeb        = val === 'web';
    document.getElementById('kokoro-controls').style.display     = isKokoro ? 'contents' : 'none';
    document.getElementById('supertonic-controls').style.display = isSupertonic ? 'block' : 'none';
    document.getElementById('web-controls').style.display        = isWeb ? 'block' : 'none';
    stopAll();
    if (isWeb) {
        setStatus('Using browser built-in speech synthesis.', '', 0);
        populateWebVoices();
    } else {
        setStatus('Engine changed — click Speak to load model.', '', 0);
    }
});

deviceSelect.addEventListener('change', () => {
    pools.kokoro.forEach(s => s.ready = false);
    stopAll();
    setStatus('Device changed — click Speak to reload model.', '', 0);
});

document.getElementById('supertonic-device-select').addEventListener('change', () => {
    pools.supertonic.forEach(s => s.ready = false);
    stopAll();
    setStatus('Device changed — click Speak to reload model.', '', 0);
});

// ── Worker pool (3 slots × 2 engines) ─────────────────────────
const NUM_SLOTS = 3;

function makeSlot(workerPath, isPrimary) {
    const s = {
        worker: workerPath === 'kokoro' ? TtsKokoro.createWorker() : new Worker(workerPath, { type: 'module' }),
        ready: false, dlFiles: {},
        loadResolve: null, genResolve: null,
        isPrimary,
    };
    s.worker.onmessage = ({ data }) => onSlotMsg(s, data);
    return s;
}

const pools = {
    kokoro:     Array.from({ length: NUM_SLOTS }, (_, i) => makeSlot('kokoro', i === 0)),
    supertonic: Array.from({ length: NUM_SLOTS }, (_, i) => makeSlot('./supertonic-worker.js', i === 0)),
};

function activePool() { return pools[engineSelect.value]; }

// ── Slot message handler ───────────────────────────────────────
function onSlotMsg(s, data) {
    if (data.type === 'progress') {
        if (!s.isPrimary) return; // only primary slot drives UI progress
        const e = data.data;
        if (e.status === 'initiate') {
            s.dlFiles[e.file] = { loaded: 0, total: e.total ?? 0 };
        } else if (e.status === 'progress' || e.status === 'downloading') {
            s.dlFiles[e.file] = { loaded: e.loaded ?? 0, total: e.total ?? 0 };
            const tl = Object.values(s.dlFiles).reduce((a, f) => a + f.loaded, 0);
            const tt = Object.values(s.dlFiles).reduce((a, f) => a + f.total,  0);
            const pct = tt > 0 ? Math.round(tl / tt * 100) : 0;
            setStatus(`Downloading… ${pct}%  (${fmtBytes(tl)} / ${fmtBytes(tt)})`, e.file, pct);
        } else if (e.status === 'done') {
            if (s.dlFiles[e.file]) s.dlFiles[e.file].loaded = s.dlFiles[e.file].total;
        }

    } else if (data.type === 'status' && s.isPrimary) {
        setStatus(data.message, '');

    } else if (data.type === 'gen-step' && s.isPrimary) {
        setStatus(`Denoising step ${data.step}/${data.total}…`, '', Math.round(data.step / data.total * 100));

    } else if (data.type === 'ready') {
        s.ready = true;
        s.loadResolve?.(); s.loadResolve = null;

    } else if (data.type === 'audio') {
        s.genResolve?.(data); s.genResolve = null;

    } else if (data.type === 'error') {
        s.loadResolve?.(); s.loadResolve = null;
        s.genResolve?.(null); s.genResolve = null;
        if (s.isPrimary) setStatus(`Error: ${data.message}`, '');
    }
}

// ── Load model on a slot ───────────────────────────────────────
const KOKORO_DEVICE = {
    wasm:   { device: 'wasm',   dtype: 'q8',   size: '~86 MB'  },
    webgpu: { device: 'webgpu', dtype: 'fp32', size: '~326 MB' },
};

function loadSlot(s) {
    if (s.ready) return Promise.resolve();
    return new Promise(res => {
        s.loadResolve = res;
        if (engineSelect.value === 'kokoro') {
            const { device, dtype } = KOKORO_DEVICE[deviceSelect.value] ?? KOKORO_DEVICE.wasm;
            s.worker.postMessage({ type: 'load', device, dtype });
        } else {
            const device = document.getElementById('supertonic-device-select').value;
            s.worker.postMessage({ type: 'load', device });
        }
    });
}

function loadPool(pool) {
    const size = engineSelect.value === 'kokoro'
        ? (KOKORO_DEVICE[deviceSelect.value] ?? KOKORO_DEVICE.wasm).size
        : '~400 MB';
    setStatus(`Loading model… (first run ${size}, cached after)`, '', 0);
    startTimer('Loading');
    return Promise.all(pool.map(s => loadSlot(s))).then(() => {
        stopTimer(); setStatus('Model ready.', '', 100);
    });
}

// ── Generate on a slot ─────────────────────────────────────────
function genParams(text) {
    if (engineSelect.value === 'kokoro')
        return { type: 'generate', text, voice: document.getElementById('voice-select').value };
    return {
        type: 'generate', text,
        lang:  document.getElementById('lang-select').value,
        style: document.getElementById('style-select').value,
        steps: parseInt(document.getElementById('steps-slider').value),
        speed: parseFloat(document.getElementById('speed-slider').value),
    };
}

function generateSlot(s, text) {
    return new Promise(res => {
        s.genResolve = res;
        s.worker.postMessage(genParams(text));
    });
}

// ── Audio ──────────────────────────────────────────────────────
let audioCtx  = null;
let activeSrcs = [];

function playSimultaneous(results) {
    audioCtx ??= new AudioContext();
    audioCtx.resume();
    activeSrcs.forEach(s => { try { s.stop(); } catch {} });
    activeSrcs = [];

    const startAt = audioCtx.currentTime + 0.05;
    let maxDur = 0;

    for (const r of results) {
        if (!r) continue;
        const buf = audioCtx.createBuffer(1, r.audio.length, r.sampleRate);
        buf.getChannelData(0).set(r.audio);
        const src = audioCtx.createBufferSource();
        src.buffer = buf;
        src.connect(audioCtx.destination);
        src.start(startAt);
        activeSrcs.push(src);
        maxDur = Math.max(maxDur, r.audio.length / r.sampleRate);
    }

    return new Promise(resolve => {
        if (!activeSrcs.length) { resolve(); return; }
        activeSrcs[0].onended = () => { activeSrcs = []; setStatus('Done.', ''); timerEl.textContent = ''; resolve(); };
    });
}

function playSingle(result) {
    return playSimultaneous([result]);
}

// ── Speak All ─────────────────────────────────────────────────
async function speakAll() {
    if (engineSelect.value === 'web') {
        btnSpeakAll.disabled = true;
        btnStop.disabled = false;
        const texts = Array.from(document.querySelectorAll('.slot-text')).map(t => t.value.trim()).filter(Boolean);
        for (const t of texts) {
            if (!activeSrcs.length) break;
            await speakWeb(t);
        }
        btnSpeakAll.disabled = false;
        btnStop.disabled = true;
        return;
    }

    const pool  = activePool();
    const texts = Array.from(document.querySelectorAll('.slot-text')).map(t => t.value.trim());

    btnSpeakAll.disabled = true;
    btnStop.disabled     = false;

    await loadPool(pool);

    setStatus('Generating all 3 in parallel…', '');
    startTimer('Generating');

    const results = await Promise.all(pool.map((s, i) => texts[i] ? generateSlot(s, texts[i]) : Promise.resolve(null)));

    const genTime = elapsed();
    stopTimer();
    timerEl.textContent = `Generated in ${genTime}s`;
    setStatus(`Playing ${results.filter(Boolean).length} streams simultaneously…`, '', 0);

    await playSimultaneous(results);

    btnSpeakAll.disabled = false;
    btnStop.disabled     = true;
}

// ── Speak single slot ─────────────────────────────────────────
async function speakSlot(slotIndex, text) {
    if (!text) return;

    if (engineSelect.value === 'web') {
        const slotBtns = document.querySelectorAll('.btn-slot-speak');
        slotBtns[slotIndex].disabled = true;
        btnStop.disabled = false;
        await speakWeb(text);
        slotBtns[slotIndex].disabled = false;
        btnStop.disabled = true;
        return;
    }

    const pool = activePool();
    const s    = pool[slotIndex];

    const slotBtns = document.querySelectorAll('.btn-slot-speak');
    slotBtns[slotIndex].disabled = true;
    btnStop.disabled = false;

    if (!s.ready) {
        setStatus('Loading model…', '', 0);
        startTimer('Loading');
        await loadSlot(s);
        stopTimer(); setStatus('Model ready.', '', 100);
    }

    setStatus(`Generating slot ${slotIndex + 1}…`, '');
    startTimer('Generating');
    const result  = await generateSlot(s, text);
    const genTime = elapsed();
    stopTimer();

    if (result) {
        timerEl.textContent = `Generated in ${genTime}s`;
        setStatus(`Playing slot ${slotIndex + 1}…`, '');
        await playSingle(result);
    }

    slotBtns[slotIndex].disabled = false;
    if (!activeSrcs.length) btnStop.disabled = true;
}

// ── Stop ──────────────────────────────────────────────────────
function stopAll() {
    stopWeb();
    activeSrcs.forEach(s => { try { s.stop(); } catch {} });
    activeSrcs = [];
    // cancel any in-flight generations
    Object.values(pools).flat().forEach(s => { s.genResolve?.(null); s.genResolve = null; });
    btnStop.disabled     = true;
    btnSpeakAll.disabled = false;
    document.querySelectorAll('.btn-slot-speak').forEach(b => b.disabled = false);
}

// ── Timer ─────────────────────────────────────────────────────
let timerHandle = null, timerStart = null;
function startTimer(label) {
    clearInterval(timerHandle);
    timerStart  = performance.now();
    timerHandle = setInterval(() => { timerEl.textContent = `${label}: ${elapsed()}s`; }, 100);
}
function stopTimer() { clearInterval(timerHandle); timerHandle = null; }
function elapsed()   { return ((performance.now() - timerStart) / 1000).toFixed(1); }

// ── Helpers ───────────────────────────────────────────────────
function setStatus(msg, file, pct) {
    statusMsg.textContent  = msg;
    statusFile.textContent = file ?? '';
    if (pct != null) progressBar.style.width = pct + '%';
}
function fmtBytes(b) {
    if (!b) return '?';
    return b < 1048576 ? (b/1024).toFixed(1)+' KB' : (b/1048576).toFixed(1)+' MB';
}

// ── Web Speech API ───────────────────────────────────────────
let _webUtterance = null;

function populateWebVoices() {
    const sel = document.getElementById('web-voice-select');
    const voices = speechSynthesis.getVoices();
    sel.innerHTML = '';
    voices.forEach(v => {
        const opt = document.createElement('option');
        opt.value = v.name;
        opt.textContent = `${v.name} (${v.lang})`;
        sel.appendChild(opt);
    });
}

speechSynthesis.onvoiceschanged = populateWebVoices;

function speakWeb(text) {
    return new Promise(resolve => {
        const u = new SpeechSynthesisUtterance(text);
        const sel = document.getElementById('web-voice-select');
        if (sel && sel.selectedIndex >= 0) {
            const voices = speechSynthesis.getVoices();
            u.voice = voices.find(v => v.name === sel.value) ?? null;
        }
        _webUtterance = u;
        u.onend = u.onerror = () => { _webUtterance = null; resolve(); };
        speechSynthesis.speak(u);
    });
}

function stopWeb() {
    if (_webUtterance) {
        speechSynthesis.cancel();
        _webUtterance = null;
    }
}

// ── Wire buttons ──────────────────────────────────────────────
document.querySelectorAll('.btn-slot-speak').forEach((btn, i) => {
    btn.addEventListener('click', () => speakSlot(i, btn.closest('.slot').querySelector('.slot-text').value.trim()));
});
btnSpeakAll.addEventListener('click', speakAll);
btnStop.addEventListener('click', () => { stopAll(); setStatus('Stopped.', ''); timerEl.textContent = ''; });
</script>
</body>
</html>
