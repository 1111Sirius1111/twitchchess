<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Twitch Chess — vs Bot</title>
<link rel="stylesheet" href="../css/styles.css">
<script src="../js/event-bus.js"></script>
<script src="../js/tts.js"></script>
<script src="../js/tts-base.js"></script>
<script src="../js/tts-supertonic.js"></script>
<script src="../js/tts-kokoro.js"></script>
<script src="../js/chess.js"></script>
<script src="../js/board.js"></script>
<script src="../js/game.js"></script>
<script src="../js/chat-log.js"></script>
<script src="../js/chat-sim.js"></script>
<script src="../js/bot.js"></script>
</head>
<body>

<!-- ── Setup ── -->
<div id="setup-screen">
    <h1>Twitch Chess <span style="color:#e07b20;font-size:14px;vertical-align:middle;">[vs Bot]</span></h1>

    <!-- TTS Backend -->
    <div style="margin:12px 0;padding:12px;background:#1e1e22;border:1px solid #2e2e36;border-radius:8px;">
        <div style="font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:#888;margin-bottom:10px;">TTS Backend</div>

        <select id="tts-backend-select" style="width:100%;background:#2a2a2e;color:#eee;border:1px solid #444;border-radius:6px;padding:7px 10px;font-size:13px;margin-bottom:8px;">
            <option value="web">Web Speech API (browser built-in)</option>
            <option value="kokoro">Kokoro — English · neural · ~86 MB</option>
            <option value="supertonic">Supertonic — 31 languages · neural · ~400 MB</option>
        </select>

        <div id="firefox-warning" style="display:none;margin-bottom:8px;padding:8px 10px;background:#3a1a00;border:1px solid #e07b20;border-radius:6px;font-size:12px;color:#e07b20;"></div>

        <div id="supertonic-settings" style="display:none;margin-bottom:8px;">
            <select id="st-device" style="width:100%;background:#2a2a2e;color:#eee;border:1px solid #444;border-radius:6px;padding:7px 10px;font-size:13px;margin-bottom:6px;">
                <option value="webgpu">WebGPU (GPU accelerated)</option>
                <option value="wasm">WASM (single-threaded)</option>
            </select>
            <select id="st-lang" style="width:100%;background:#2a2a2e;color:#eee;border:1px solid #444;border-radius:6px;padding:7px 10px;font-size:13px;margin-bottom:6px;">
                <option value="en">English</option>
                <option value="de">German</option>
                <option value="fr">French</option>
                <option value="es">Spanish</option>
                <option value="it">Italian</option>
                <option value="pt">Portuguese</option>
                <option value="nl">Dutch</option>
                <option value="pl">Polish</option>
                <option value="ru">Russian</option>
                <option value="uk">Ukrainian</option>
                <option value="sv">Swedish</option>
                <option value="da">Danish</option>
                <option value="fi">Finnish</option>
                <option value="cs">Czech</option>
                <option value="sk">Slovak</option>
                <option value="ro">Romanian</option>
                <option value="hu">Hungarian</option>
                <option value="hr">Croatian</option>
                <option value="sl">Slovenian</option>
                <option value="bg">Bulgarian</option>
                <option value="el">Greek</option>
                <option value="tr">Turkish</option>
                <option value="ar">Arabic</option>
                <option value="hi">Hindi</option>
                <option value="id">Indonesian</option>
                <option value="vi">Vietnamese</option>
                <option value="ja">Japanese</option>
                <option value="ko">Korean</option>
                <option value="et">Estonian</option>
                <option value="lv">Latvian</option>
                <option value="lt">Lithuanian</option>
                <option value="na">Auto-detect</option>
            </select>
            <div style="display:flex;gap:10px;align-items:center;">
                <label style="font-size:12px;color:#aaa;white-space:nowrap;">Steps</label>
                <input type="range" id="st-steps" min="1" max="12" step="1" value="8" style="flex:1;background:transparent;">
                <span id="st-steps-val" style="font-size:13px;color:#fff;min-width:20px;">8</span>
            </div>
        </div>

        <div id="kokoro-settings" style="display:none;margin-bottom:8px;">
            <select id="kokoro-device" style="width:100%;background:#2a2a2e;color:#eee;border:1px solid #444;border-radius:6px;padding:7px 10px;font-size:13px;margin-bottom:6px;">
                <option value="webgpu">WebGPU (fp32, ~326 MB)</option>
                <option value="wasm">WASM (q8, ~86 MB)</option>
            </select>
        </div>

        <div id="tts-load-row" style="display:none;margin-top:8px;">
            <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
                <button id="btn-tts-load" style="padding:6px 14px;background:#9146ff;color:#fff;border:none;border-radius:6px;font-size:13px;cursor:pointer;">⬇ Load model</button>
                <span id="tts-load-status" style="font-size:12px;color:#888;"></span>
            </div>
            <div id="tts-dl-wrap" style="display:none;margin-top:8px;">
                <div style="background:#333;border-radius:4px;height:6px;overflow:hidden;margin-bottom:4px;">
                    <div id="tts-dl-bar" style="background:#9146ff;height:100%;width:0%;transition:width .2s;border-radius:4px;"></div>
                </div>
                <div id="tts-dl-file" style="font-size:11px;color:#666;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;"></div>
            </div>
        </div>
    </div><!-- /tts-backend box -->

    <div class="row" style="margin:10px 0;">
        <button class="btn-green" id="start-btn" onclick="startGame()">Start Game</button>
    </div>
</div>

<!-- ── Game ── -->
<div id="game-screen">
    <div id="game-top">
        <div id="board"></div>
        <div id="right-panel">
            <div id="game-status">White to move</div>
            <div id="chat-log"></div>
            <div id="game-controls">
                <button class="btn-red" onclick="endGame()">End Game</button>
            </div>
        </div>
    </div>
</div>

<!-- Promo modal -->
<div id="promo-modal">
    <div id="promo-box">
        <h2>Promote pawn</h2>
        <div id="promo-choices"></div>
    </div>
</div>

<div id="win-overlay">
    <div id="win-box">
        <div id="win-title"></div>
        <div id="win-sub"></div>
        <button class="btn-green" onclick="closeWin()">Play Again</button>
    </div>
</div>

<script>
const isFirefox = navigator.userAgent.includes('Firefox');

const SUPERTONIC_LANGS = [
    ['en','English'],['de','German'],['fr','French'],['es','Spanish'],['it','Italian'],
    ['pt','Portuguese'],['nl','Dutch'],['pl','Polish'],['ru','Russian'],['uk','Ukrainian'],
    ['sv','Swedish'],['da','Danish'],['fi','Finnish'],['cs','Czech'],['sk','Slovak'],
    ['ro','Romanian'],['hu','Hungarian'],['hr','Croatian'],['sl','Slovenian'],['bg','Bulgarian'],
    ['el','Greek'],['tr','Turkish'],['ar','Arabic'],['hi','Hindi'],['id','Indonesian'],
    ['vi','Vietnamese'],['ja','Japanese'],['ko','Korean'],['et','Estonian'],['lv','Latvian'],
    ['lt','Lithuanian'],['na','Auto'],
];

let tts            = new TTS();
let ttsBackendType = 'web';

const TTS_FACTORIES = {
    web: () => new TTS(),
    kokoro: () => {
        const t = new TtsKokoro();
        t.device  = document.getElementById('kokoro-device').value;
        t.onready = () => updateStartButton();
        return t;
    },
    supertonic: () => {
        const t = new TtsSupertonic();
        t.device   = document.getElementById('st-device').value;
        t.lang     = document.getElementById('st-lang').value;
        t.steps    = parseInt(document.getElementById('st-steps').value);
        t.onready  = () => updateStartButton();
        return t;
    },
};

document.getElementById('tts-backend-select').addEventListener('change', e => {
    tts.stop?.();
    ttsBackendType = e.target.value;
    tts = TTS_FACTORIES[ttsBackendType]();
    game.setTts(tts);
    localStorage.setItem('tts-backend', ttsBackendType);
    document.getElementById('kokoro-settings').style.display    = ttsBackendType === 'kokoro' ? '' : 'none';
    document.getElementById('supertonic-settings').style.display = ttsBackendType === 'supertonic' ? '' : 'none';
    document.getElementById('tts-load-row').style.display        = ttsBackendType !== 'web' ? '' : 'none';
    const _ffWarn = document.getElementById('firefox-warning');
    if (isFirefox && (ttsBackendType === 'kokoro' || ttsBackendType === 'supertonic')) {
        _ffWarn.textContent = ttsBackendType === 'kokoro'
            ? '⚠ Kokoro is broken in Firefox (tested June 2026). Use Edge or Chrome.'
            : '⚠ Firefox WebGPU implementation is slow (tested June 2026). Use Edge or Chrome for acceptable performance.';
        _ffWarn.style.display = '';
    } else {
        _ffWarn.style.display = 'none';
    }
    document.getElementById('tts-load-status').textContent       = '';
});

document.getElementById('kokoro-device').addEventListener('change', e => {
    if (ttsBackendType === 'kokoro') { tts.device = e.target.value; tts._ready = false; tts._loading = null; updateStartButton(); }
});

document.getElementById('st-device').addEventListener('change', e => {
    if (ttsBackendType === 'supertonic') { tts.device = e.target.value; tts._ready = false; tts._loading = null; updateStartButton(); }
});
document.getElementById('st-lang').addEventListener('change', e => {
    if (ttsBackendType === 'supertonic') tts.lang = e.target.value;
});
document.getElementById('st-steps').addEventListener('input', e => {
    document.getElementById('st-steps-val').textContent = e.target.value;
    if (ttsBackendType === 'supertonic') tts.steps = parseInt(e.target.value);
});

document.getElementById('btn-tts-load').addEventListener('click', async () => {
    const statusEl = document.getElementById('tts-load-status');
    const barEl    = document.getElementById('tts-dl-bar');
    const fileEl   = document.getElementById('tts-dl-file');
    const wrap     = document.getElementById('tts-dl-wrap');

    wrap.style.display   = 'block';
    barEl.style.width    = '0%';
    statusEl.textContent = 'Loading…';

    const dlFiles = {};
    try { await tts.preload((prog) => {
        if (prog.status === 'progress' || prog.status === 'downloading') {
            dlFiles[prog.file] = { loaded: prog.loaded ?? 0, total: prog.total ?? 0 };
            const tl  = Object.values(dlFiles).reduce((a, f) => a + f.loaded, 0);
            const tt  = Object.values(dlFiles).reduce((a, f) => a + f.total,  0);
            const pct = tt > 0 ? Math.round(tl / tt * 100) : Math.round(prog.progress ?? 0);
            barEl.style.width    = pct + '%';
            statusEl.textContent = `${pct}%  (${fmtBytes(tl)} / ${fmtBytes(tt)})`;
            fileEl.textContent   = prog.file ?? '';
        } else if (prog.status === 'done') {
            if (dlFiles[prog.file]) dlFiles[prog.file].loaded = dlFiles[prog.file].total;
            fileEl.textContent = `✓ ${prog.file ?? 'file'}`;
        } else if (prog.status === 'gen-step') {
            statusEl.textContent = `Denoising ${prog.step}/${prog.total}…`;
            barEl.style.width    = Math.round(prog.step / prog.total * 100) + '%';
        }
    });
        barEl.style.width    = '100%';
        statusEl.textContent = '✓ Ready';
        updateStartButton();
    } catch (err) {
        barEl.style.width    = '0%';
        statusEl.textContent = `⚠ ${err.message}`;
        statusEl.style.color = '#e07b20';
        updateStartButton();
    }
});

function fmtBytes(b) {
    if (!b) return '?';
    if (b < 1048576) return (b / 1024).toFixed(1) + ' KB';
    return (b / 1048576).toFixed(1) + ' MB';
}

const game        = new Game(tts);
const board       = new ChessBoard();
const chatLog     = new ChatLog();
const chatSim     = new ChatSim(tts);

board.mount(
    document.getElementById('board'),
    document.getElementById('game-status'),
    document.getElementById('promo-modal')
);
game.setBoard(board);
chatLog.mount(document.getElementById('chat-log'));

bus.on('game:moved', ({ game: chess }) => {
    if (chess.status === 'checkmate' || chess.status === 'stalemate') {
        const title = document.getElementById('win-title');
        const sub   = document.getElementById('win-sub');
        if (chess.status === 'checkmate') {
            const winner = chess.winner;
            title.textContent = 'Checkmate!';
            title.className = winner === 'white' ? 'win-white' : 'win-black';
            sub.textContent = `${winner === 'white' ? 'White' : 'Black'} wins!`;
        } else {
            title.textContent = 'Stalemate!';
            title.className = '';
            sub.textContent = 'The game is a draw.';
        }
        document.getElementById('win-overlay').classList.add('show');
    }
});

function closeWin() {
    document.getElementById('win-overlay').classList.remove('show');
}

function updateStartButton() {
    const btn          = document.getElementById('start-btn');
    const modelPending = (ttsBackendType === 'supertonic' || ttsBackendType === 'kokoro') && !tts._ready;
    btn.disabled = modelPending;
    if (modelPending) {
        btn.style.background = '#e07b20';
        btn.title = 'Load the model first (click ⬇ Load model)';
    } else {
        btn.style.background = '';
        btn.title = '';
    }
}

const _savedBackend = localStorage.getItem('tts-backend');
if (_savedBackend && TTS_FACTORIES[_savedBackend]) {
    document.getElementById('tts-backend-select').value = _savedBackend;
    document.getElementById('tts-backend-select').dispatchEvent(new Event('change'));
}

// ── Game screen transitions ────────────────────────────────────
function startGame() {
    closeWin();
    game.clearPlayers();
    const supported = tts.supportedVoices;
    const names = [...DUMMY_NAMES].sort(() => Math.random() - 0.5);
    for (let i = 0; i < 16; i++) {
        const voiceIndex = supported.length ? supported[Math.floor(Math.random() * supported.length)].index : 0;
        game.addPlayer({ username: names[i], color: 'white', voiceIndex, lang: 'en', chatColor: '#ffffff' });
    }
    for (let i = 16; i < 32; i++) {
        const voiceIndex = supported.length ? supported[Math.floor(Math.random() * supported.length)].index : 0;
        game.addPlayer({ username: names[i], color: 'black', voiceIndex, lang: 'en', chatColor: '#e07b20' });
    }
    new Bot(game);
    game.start();
    document.getElementById('setup-screen').style.display = 'none';
    document.getElementById('game-screen').style.display  = 'flex';
}

function endGame() {
    closeWin();
    game.end();
    document.getElementById('game-screen').style.display  = 'none';
    document.getElementById('setup-screen').style.display = 'block';
}
</script>
</body>
</html>
